<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Agora</title>

    <link rel="stylesheet" href="climastyle.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>☁️ Clima Agora</h1>

            <p class="subtitulo">
                Previsão do tempo em tempo real
            </p>

            <div class="cidade">

                <h2 id="local">
                    Carregando localização...
                </h2>

                <div class="data-hora">
                    <p id="data"></p>
                    <p id="hora"></p>
                </div>

            </div>

            <img id="icone" src="" alt="Ícone do clima">

            <h1 id="temperatura">
                --°C
            </h1>

            <h3 id="descricao">
                Buscando dados...
            </h3>

            <div class="info">

                <div class="box">
                    <span>💧 Umidade</span>
                    <strong id="umidade">--%</strong>
                </div>

                <div class="box">
                    <span>🌬 Vento</span>
                    <strong id="vento">-- km/h</strong>
                </div>

            </div>

            <button onclick="buscarClima()">
                Atualizar Clima
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
